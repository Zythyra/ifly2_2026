#Description:
#  全局代价地图参数配置文件,各参数的意义如下：
#  global_frame:在全局代价地图中的全局坐标系;
#  robot_base_frame:机器人的基坐标系;
#
global_costmap:
  global_frame: map
  robot_base_frame: base_link
  update_frequency: 5.0
  publish_frequency: 5.0

  resolution: 0.01
  # cost_scaling_factor: 14.0     #14.0  
  # inflation_radius: 0.33         #0.33  注：这里的参数和common_params里面的参数重复了，这里的会把前者的参数覆盖掉
  cost_scaling_factor: 15.0
  inflation_radius: 0.23
  
  static_map: true
  rolling_window: false
  transform_tolerance: 0.5
  track_unknown_space: false
  plugins:
    - {name: static_layer,    type: "costmap_2d::StaticLayer"}
    - {name: obstacle_layer,  type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  # static_layer:
  #   map_topic: "/planning_map"  # 使用规划地图的话题